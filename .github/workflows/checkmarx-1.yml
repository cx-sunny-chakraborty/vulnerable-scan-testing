# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# The Checkmarx One GitHub Action enables you to trigger SAST, SCA, and KICS scans directly from the GitHub workflow.
# It provides a wrapper around the Checkmarx One CLI Tool which creates a zip archive from your source code repository
# and uploads it to Checkmarx One for scanning. The Github Action provides easy integration with GitHub while enabling
# scan customization using the full functionality and flexibility of the CLI tool.

# This is a basic workflow to help you get started with Using Checkmarx One Action,
# documentation can be found here : https://checkmarx.com/resource/documents/en/34965-68702-checkmarx-one-github-actions.html

name: Checkmarx Scan
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [ "main" ]
  workflow_dispatch:
  
permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    environment: Checkmarx
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Checkmarx One scan
        uses: checkmarx/ast-github-action@8e887bb93dacc44e0f5b64ee2b06d5815f89d4fc
        with:
          base_uri: https://ind.ast.checkmarx.net
          cx_client_id: ${{ secrets.CX_CLIENT_ID }}
          cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
          cx_tenant: ${{ secrets.CX_TENANT }}
          project_name: vulnerable-code-github-actions 
          additional_params: --report-format sarif --output-path .
      
      - name: Fix SARIF severity levels
        run: |
          python3 << 'EOF'
          import json
          
          with open('cx_result.sarif', 'r') as f:
              sarif = json.load(f)
          
          # Map Checkmarx levels to SARIF levels
          level_mapping = {
              'critical': 'error',
              'high': 'error',
              'medium': 'warning',
              'low': 'note',
              'info': 'note',
              'informational': 'none'
          }
          
          # Fix all results
          for run in sarif.get('runs', []):
              for result in run.get('results', []):
                  original_level = result.get('level', '').lower()
                  if original_level in level_mapping:
                      result['level'] = level_mapping[original_level]
                  elif result['level'] not in ['none', 'note', 'warning', 'error']:
                      result['level'] = 'warning'  # Default to warning
          
          with open('cx_result.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          
          print("SARIF file fixed successfully")
          EOF
      
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cx_result.sarif
